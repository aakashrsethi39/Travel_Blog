version: "3.8"

services:

  mongodb:
    image: mongo:7
    container_name: mongodb

    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - ./backend/data:/data

    networks:
      - app-network

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend

    container_name: backend

    restart: unless-stopped

    env_file:
      - ./backend/.env.sample

    ports:
      - "5000:5000"

    depends_on:
      mongodb:
        condition: service_healthy

    networks:
      - app-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend

    container_name: frontend

    restart: unless-stopped

    env_file:
      - ./backend/.env.sample

    ports:
      - "5173:5173"

    depends_on:
      - backend

    networks:
      - app-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  data:

networks:
  app-network:
    driver: bridge
